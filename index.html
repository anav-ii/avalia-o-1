<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULÁRIO_DE_RESÍDUOS</title>
    <script src="js/script.js" type="module" defer></script>

</head>
<body>
    <div id="geral">

        <h3>Cadastro Empresa</h3>

        <div id="div-regras">
            <p>Até R$ 1000,00 → Não atingiu meta</p>
            <p>De R$ 1000,00 até R$ 10000,00 → Premiação 8%</p>
            <p>De R$ 10000,00 até R$ 15000,00 → Premiação 10%</p>
            <p>De R$ 15000,00 até R$ 25000,00 → Premiação 15%</p>
            <p>Acima de R$ 25000,00 → Premiação 20%</p>
        </div>

        <div id="div-form-empresa">

            <form id="form-empresa">

                <label for="descricao">DESCRIÇÃO</label>
                <input type="text" name="descricao" id="descricao">

                <label for="quantidade">QUANTIDADE</label>
                <input type="number" name="quantidade" id="quantidade">

                <button type="submit" id="btn-add">ENVIAR</button>
                
            </form>

        </div>

        <div id="div-lista-empresas">

        </div>

    </div>
</body>

</html>
